# SETUP
baseurl = "https://coiniran.academy/"
canonifyUrls = "true"
disableKinds = ["RSS","taxonomy","term"] # disable hugo's content that we don't need...

defaultContentLanguage = "fa"
defaultContentLanguageInSubdir = false   # fa served at /, en served at /en/

publishdir = "docs"

#googleAnalytics = "G-6RSMTN9RB2" # GA is wired directly in ./layouts/partials/head.html

# content markdown contains inline HTML (dir / styling wrappers) — allow it
[markup.goldmark.renderer]
    unsafe = true

[params]
    # shared, language-neutral params
    images = [] # add images here as "img/name.ext" (points to ./static/img/) -> see ./layouts/partials/head.html
    [params.author]
        name = "Coiniran Academy"
        email = "info@shiryakhat.net"

# ---------------------------------------------------------------------------
# LANGUAGES
# Social/menu links are defined per-language so labels are translated.
# They render into 1. a tooltip in the navbar and 2. the footer.
# ---------------------------------------------------------------------------

[languages]

  [languages.fa]
    label = "فارسی"
    direction = "rtl"
    weight = 1
    contentDir = "content/fa"
    title = "آکادمی کوین‌ ایران - Coiniran Academy"
    [languages.fa.params]
        description = "آکادمی کوین‌ ایران٫ دوره آموزشی بلاکچین٫ قرارداد هوشمند با سالیدیتی - Coiniran Academy - Smartcontract Development course"

    [[languages.fa.params.social]]
        title = "دوره ۱۴۰۲"
        url = "https://smartcontract.coiniran.com/t/topic/5637"
    [[languages.fa.params.social]]
        title = "دوره ۱۴۰۰"
        url = "https://smartcontract.coiniran.com/t/topic/1501"
    [[languages.fa.params.social]]
        title = "یوتیوب ۱۴۰۲"
        url = "https://www.youtube.com/playlist?list=PLDwI1rIhknpN-4ZnbcQfqDgM5dVY73ruS"
    [[languages.fa.params.social]]
        title = "یوتیوب ۱۴۰۰"
        url = "https://www.youtube.com/playlist?list=PLDwI1rIhknpNyUWdFt_XD6rpTEjTkUcYo"
    [[languages.fa.params.social]]
        title = "توییتر"
        url = "https://x.com/coiniranacademy"
    [[languages.fa.params.social]]
        title = "انجمن"
        url = "https://smartcontract.coiniran.com"

  [languages.en]
    label = "English"
    direction = "ltr"
    weight = 2
    contentDir = "content/en"
    title = "Coiniran Academy — Blockchain & Smart Contract Course"
    [languages.en.params]
        description = "Coiniran Academy — a free Blockchain & Smart Contract development course in Solidity for Persian-speaking developers."

    [[languages.en.params.social]]
        title = "2023 Course"
        url = "https://smartcontract.coiniran.com/t/topic/5637"
